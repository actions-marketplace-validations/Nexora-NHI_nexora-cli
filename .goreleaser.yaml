version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nexora
    main: ./main.go
    binary: nexora
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Nexora-NHI/nexora-cli/internal/version.Version={{.Version}}
      - -X github.com/Nexora-NHI/nexora-cli/internal/version.Commit={{.Commit}}
      - -X github.com/Nexora-NHI/nexora-cli/internal/version.BuildDate={{.Date}}

archives:
  - id: nexora
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents:
      - "${artifact}.spdx.json"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

dockers:
  - image_templates:
      - "ghcr.io/nexora-nhi/nexora-cli:{{ .Tag }}"
      - "ghcr.io/nexora-nhi/nexora-cli:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/Nexora-NHI/nexora-cli"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

brews:
  - repository:
      owner: Nexora-NHI
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Nexora-NHI/nexora-cli"
    description: "NHI risk scanner for GitHub Actions, Kubernetes, and IaC"
    license: "Apache-2.0"
    install: |
      bin.install "nexora"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
