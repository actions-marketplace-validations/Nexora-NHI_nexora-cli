name: 'Nexora NHI Scanner'
description: 'Scan for non-human identity risks in GitHub Actions, Kubernetes, and IaC'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-type:
    description: 'Type of scan: workflows, k8s, iac, or github'
    required: true
  path:
    description: 'Path to scan (not used for github scan type)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity threshold (LOW, MEDIUM, HIGH, CRITICAL)'
    required: false
    default: 'MEDIUM'
  format:
    description: 'Output format (table, json, sarif, ocsf)'
    required: false
    default: 'sarif'
  output:
    description: 'Output file path'
    required: false
    default: 'nexora-results.sarif'
  upload-sarif:
    description: 'Automatically upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'

  github-token:
    description: 'Optional: GitHub token (fine-grained) for org scans; defaults to runner GITHUB_TOKEN if not set'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Nexora CLI
      shell: bash
      run: |
        export INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"
        bash -c "$(curl -sSfL https://raw.githubusercontent.com/Nexora-NHI/nexora-cli/main/scripts/install.sh)"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        nexora version

    - name: Run Nexora Scan
      shell: bash
      run: |
        if [ "${{ inputs.scan-type }}" = "github" ]; then
          if [ -n "${{ inputs.github-token }}" ]; then
            export GITHUB_TOKEN="${{ inputs.github-token }}"
          fi
          nexora scan github --org ${{ github.repository_owner }} --severity ${{ inputs.severity }} --format ${{ inputs.format }} --output ${{ inputs.output }}
        else
          nexora scan ${{ inputs.scan-type }} --path ${{ inputs.path }} --severity ${{ inputs.severity }} --format ${{ inputs.format }} --output ${{ inputs.output }}
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v3
      with:
        sarif_file: ${{ inputs.output }}
