version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - misspell
    - revive
    - gosec

  settings:
    gosec:
      excludes:
        - G304
    revive:
      rules:
        - name: exported
          severity: warning

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Nexora-Inc-AFNOOR-LLC-DBA-NEXORA-INC/nexora-cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
