version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - noctx

  settings:
    gosec:
      excludes:
        - G304
    revive:
      rules:
        - name: exported
          severity: warning
    goimports:
      local-prefixes: github.com/Nexora-Inc-AFNOOR-LLC-DBA-NEXORA-INC/nexora-cli

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
