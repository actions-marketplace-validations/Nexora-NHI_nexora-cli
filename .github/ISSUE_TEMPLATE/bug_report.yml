name: Bug Report
description: Report a bug or incorrect finding
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out all fields so we can reproduce it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact command and input that triggered the bug.
      placeholder: |
        nexora scan workflows --path ./path/to/workflows/
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: What did you expect nexora-cli to output?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: Paste the actual output here.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: nexora-cli version
      placeholder: nexora version
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: e.g. Ubuntu 22.04 amd64, macOS 14 arm64
    validations:
      required: true

  - type: dropdown
    id: security_impact
    attributes:
      label: Security impact
      description: Does this bug cause false negatives (missed real findings) or false positives (wrong findings)?
      options:
        - False negative (missed a real finding)
        - False positive (incorrect finding)
        - No security impact (crash, output format, etc.)
    validations:
      required: true
